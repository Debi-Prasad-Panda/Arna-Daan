<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — Annadaan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', sans-serif;
      background: #181210;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #23140f;
      border: 1px solid #3a2c27;
      border-radius: 1.5rem;
      padding: 2.5rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: rgba(232,98,42,0.12);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 900; }
    p  { color: #bca39a; font-size: 0.95rem; line-height: 1.6; }
    button {
      background: #e8622a;
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      padding: 0.875rem 2rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background: #c0532a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <div>
      <h1>You're Offline</h1>
    </div>
    <p>
      It looks like you're not connected to the internet. Check your connection and try again — your donation data is safely stored.
    </p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
